[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = '''
/(
  venv_.*
  | \.venv
  | \.black_cache
  | \.mypy_cache
  | \.pytest_cache
  | __pycache__
)/
'''
force-exclude = '''
(^|[\\/])tests[\\/]test_ui_rebalance_app\.py$
'''

[tool.ruff]
line-length = 100

[tool.ruff.lint]
extend-select = ["I"]   # import order/isort


[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-q"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
exclude = '(^|[\\/])(build|dist|outputs[\\/]work|venv_.*|\\.mypy_cache|\\.pytest_cache)([\\/]|$)'
