# Run "pre-commit run --all-files" once after installing to see current issues.
repos:
  # 基本の小回りフック
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml

  # Black formatting check.
  # Use the local single-process helper because direct multi-file Black can hang on Windows.
  - repo: local
    hooks:
      - id: black-check
        name: black check
        entry: venv_SMAI/Scripts/python.exe tools/run_black_check.py
        language: system
        pass_filenames: false

  # Ruff（Lint + import順/自動修正）
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.3
    hooks:
      - id: ruff
        args: [--fix]    # 可能なものは自動修正

  # mypy（型チェック）
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-PyYAML==6.0.12.20240808
        # pyproject.toml の [tool.mypy] 設定が使われます

  # pre-push で pytest を走らせる（重いので push 時のみ）
  - repo: local
    hooks:
      - id: pytest
        name: pytest (pre-push)
        entry: venv_SMAI/Scripts/python.exe -m pytest -q
        language: system
        pass_filenames: false
        stages: [push]
