app:
  timezone: UTC
  log_json: true

network:
  # Set this to the MagicDNS hostname of the SMAI server.
  tailscale_hostname: desktop-bqrpr4c
  main_application:
    scheme: http
    port: 8501

dataaccess:
  provider: yahoo
  csv_data_dir: data/marketdata
  allow_external_providers: true

risk:
  thresholds:
    max_notional_per_symbol: 3000000
    max_notional_per_basket: 10000000
    max_concentration: 0.25
    min_adv: 50000000
    min_dividend_yield: 0.03
    max_volatility: 0.6

portfolio:
  solver:
    backend: none
    tolerance: 0.000001

scoring:
  weights:
    screening: 0.50
    forecast_agreement: 0.20
    data_quality: 0.20
    research: 0.00
    risk_signal: 0.10
